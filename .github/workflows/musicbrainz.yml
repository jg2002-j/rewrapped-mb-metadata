name: Build MusicBrainz Analytics Database

on:
  schedule:
    - cron: '33 3 * * 3' # Every Wednesday at 03:33 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Hard stop below GitHub's 6h (360 min) job cap so a runaway run fails with a
    # clear signal instead of being killed at the ceiling.
    timeout-minutes: 330
    env:
      # --- guardrail thresholds (tune to the runner you target) ---
      MAX_RSS_MB: 6500          # fail if peak physical RAM exceeds this (~7GB box headroom)
      MIN_DISK_AVAIL_GB: 3      # fail if free disk on the work volume ever drops below this
      MAX_RUNTIME_MIN: 300      # soft wall-clock ceiling (hard GitHub cap is 360)
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System and Python Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y zstd curl tar time
          # Pin DuckDB so a future breaking release can't silently change behaviour.
          pip install "duckdb>=1.0,<2.0"

      # NOTE: the production dump is downloaded by the pipeline itself
      # (utils.stream_and_load_musicbrainz streams it directly under --prod),
      # so there is no separate download step here.

      - name: Generate Runtime Timestamp
        id: timestamp
        run: echo "RUN_TS=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build and compress (measured)
        run: |
          set +e
          set -o pipefail

          DISK_LOG="$(mktemp)"
          TIME_REPORT="$(mktemp)"
          ARTIFACT="metadata-${{ steps.timestamp.outputs.RUN_TS }}.db.zst"

          # --- background disk high-water sampler (every 10s) ---
          # Records, per sample: available bytes on the work volume + bytes used by
          # the working tree (spill buffer, engine file, db, vacuum copy, .zst).
          sample_disk() {
            while true; do
              avail=$(df -B1 --output=avail . 2>/dev/null | tail -1 | tr -d ' ')
              used=$(du -sb . 2>/dev/null | cut -f1)
              echo "${avail:-0} ${used:-0}" >> "$DISK_LOG"
              sleep 10
            done
          }
          sample_disk &
          SAMPLER_PID=$!
          trap 'kill "$SAMPLER_PID" 2>/dev/null || true' EXIT

          # --- pipeline under GNU /usr/bin/time -v (peak RSS) ---
          # /usr/bin/time writes its report to -o; the pipeline's own per-phase
          # logs still stream to the console.
          PIPE_START=$(date +%s)
          /usr/bin/time -v -o "$TIME_REPORT" python scripts/main.py --prod
          PY_EXIT=$?
          PIPE_END=$(date +%s)
          PIPE_SECS=$(( PIPE_END - PIPE_START ))

          # --- compression (only if the pipeline produced a database) ---
          ZSTD_EXIT=0
          ZSTD_SECS=0
          if [ "$PY_EXIT" -eq 0 ]; then
            Z_START=$(date +%s)
            zstd -T0 --ultra -22 metadata.db -o "$ARTIFACT"
            ZSTD_EXIT=$?
            ZSTD_SECS=$(( $(date +%s) - Z_START ))
          fi

          # --- stop sampler ---
          kill "$SAMPLER_PID" 2>/dev/null || true
          wait "$SAMPLER_PID" 2>/dev/null || true

          # --- parse measurements ---
          PEAK_RSS_KB=$(grep -i "Maximum resident set size" "$TIME_REPORT" | grep -oE '[0-9]+' | tail -1)
          PEAK_RSS_KB=${PEAK_RSS_KB:-0}
          RSS_MB=$(( PEAK_RSS_KB / 1024 ))

          SAMPLES=$(wc -l < "$DISK_LOG" 2>/dev/null | tr -d ' ')
          SAMPLES=${SAMPLES:-0}
          MIN_AVAIL=$(awk 'NR==1{m=$1} $1<m{m=$1} END{print (NR? m : 0)+0}' "$DISK_LOG" 2>/dev/null)
          MAX_USED=$(awk 'BEGIN{m=0} $2>m{m=$2} END{print m+0}' "$DISK_LOG" 2>/dev/null)
          MIN_AVAIL=${MIN_AVAIL:-0}
          MAX_USED=${MAX_USED:-0}
          AVAIL_GB=$(awk "BEGIN{printf \"%.2f\", $MIN_AVAIL/1073741824}")
          USED_GB=$(awk "BEGIN{printf \"%.2f\", $MAX_USED/1073741824}")

          TOTAL_SECS=$(( PIPE_SECS + ZSTD_SECS ))
          PIPE_MIN=$(awk "BEGIN{printf \"%.1f\", $PIPE_SECS/60}")
          ZSTD_MIN=$(awk "BEGIN{printf \"%.1f\", $ZSTD_SECS/60}")
          TOTAL_MIN=$(awk "BEGIN{printf \"%.1f\", $TOTAL_SECS/60}")

          DB_MB=0;  [ -f metadata.db ] && DB_MB=$(( $(stat -c%s metadata.db) / 1048576 ))
          ART_MB=0; [ -f "$ARTIFACT" ] && ART_MB=$(( $(stat -c%s "$ARTIFACT") / 1048576 ))

          # --- human-readable report -> job summary + log ---
          {
            echo "## Pipeline guardrail report"
            echo ""
            echo "| Metric | Value | Limit |"
            echo "|---|---|---|"
            echo "| Peak RSS | ${RSS_MB} MB | ${MAX_RSS_MB} MB |"
            echo "| Min free disk | ${AVAIL_GB} GB | ${MIN_DISK_AVAIL_GB} GB |"
            echo "| Peak working-set disk | ${USED_GB} GB | - |"
            echo "| Pipeline time | ${PIPE_MIN} min | - |"
            echo "| Compression time | ${ZSTD_MIN} min | - |"
            echo "| Total time | ${TOTAL_MIN} min | ${MAX_RUNTIME_MIN} min |"
            echo "| Uncompressed DB | ${DB_MB} MB | - |"
            echo "| Compressed artifact | ${ART_MB} MB | - |"
            echo "| Disk samples taken | ${SAMPLES} | - |"
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          # --- hand measurements to the enforcement step ---
          {
            echo "PY_EXIT=$PY_EXIT"
            echo "ZSTD_EXIT=$ZSTD_EXIT"
            echo "RSS_MB=$RSS_MB"
            echo "MIN_AVAIL=$MIN_AVAIL"
            echo "SAMPLES=$SAMPLES"
            echo "TOTAL_SECS=$TOTAL_SECS"
            echo "TOTAL_MIN=$TOTAL_MIN"
            echo "AVAIL_GB=$AVAIL_GB"
          } > guardrail_metrics.env

          # Fail this step immediately only on a hard process error (no artifact to
          # keep). Resource-limit breaches are enforced after upload so the artifact
          # is still preserved for inspection.
          if [ "$PY_EXIT" -ne 0 ]; then echo "::error::Pipeline process exited with code $PY_EXIT"; exit "$PY_EXIT"; fi
          if [ "$ZSTD_EXIT" -ne 0 ]; then echo "::error::Compression exited with code $ZSTD_EXIT"; exit "$ZSTD_EXIT"; fi

      - name: Upload Finished Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ steps.timestamp.outputs.RUN_TS }}
          path: metadata-${{ steps.timestamp.outputs.RUN_TS }}.db.zst
          retention-days: 14
          if-no-files-found: ignore

      - name: Enforce guardrails
        if: always()
        run: |
          set +e
          if [ ! -f guardrail_metrics.env ]; then
            echo "No guardrail metrics found (build step failed before producing them)."
            exit 0
          fi
          set -a; . ./guardrail_metrics.env; set +a

          FAIL=0
          if [ "${RSS_MB:-0}" -gt "$MAX_RSS_MB" ]; then
            echo "::error::Peak RSS ${RSS_MB}MB exceeded ceiling ${MAX_RSS_MB}MB"; FAIL=1
          fi
          if [ "${SAMPLES:-0}" -gt 0 ] && awk "BEGIN{exit !(${MIN_AVAIL:-0} < $MIN_DISK_AVAIL_GB*1073741824)}"; then
            echo "::error::Free disk fell to ${AVAIL_GB}GB, below ${MIN_DISK_AVAIL_GB}GB floor"; FAIL=1
          fi
          if [ "${TOTAL_SECS:-0}" -gt $(( MAX_RUNTIME_MIN * 60 )) ]; then
            echo "::error::Total runtime ${TOTAL_MIN}min exceeded ${MAX_RUNTIME_MIN}min"; FAIL=1
          fi

          if [ "$FAIL" -eq 0 ]; then
            echo "All guardrails within limits."
          fi
          exit "$FAIL"
