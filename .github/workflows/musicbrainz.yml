name: Build MusicBrainz Analytics Database

on:
  schedule:
    - cron: '33 3 * * 3' # Every Wednesday at 03:33 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System and Python Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y zstd curl tar
          # Pin DuckDB so a future breaking release can't silently change behaviour.
          pip install "duckdb>=1.0,<2.0"

      - name: Generate Runtime Timestamp
        id: timestamp
        run: echo "RUN_TS=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Execute Pipeline Engine
        run: python scripts/main.py --prod

      - name: Compress Output Database
        run: |
          zstd -T0 --ultra -22 mb_metadata.db -o "metadata-${{ steps.timestamp.outputs.RUN_TS }}.db.zst"

      - name: Upload Finished Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ steps.timestamp.outputs.RUN_TS }}
          path: metadata-${{ steps.timestamp.outputs.RUN_TS }}.db.zst
          retention-days: 14
