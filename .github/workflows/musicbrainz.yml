name: Build MusicBrainz Analytics Database

on:
  schedule:
    - cron: '33 3 * * 3' # Every Wednesday at 03:33 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Hard stop below GitHub's 6h (360 min) job cap. -19 compression on this DB is
    # ~3.5-4h, so the cap is set high (350) but still self-fails cleanly before 360.
    timeout-minutes: 350
    env:
      # --- target runner envelope: PUBLIC-repo standard runner -----------------
      # Public repos: 4 vCPU / 16 GB RAM / 14 GB SSD  (free, unlimited minutes).
      # (Private repos would be 2 vCPU / 7 GB; if you ever make the repo private,
      #  set RUNNER_RAM_MB=7168, PIPELINE_MEMORY_LIMIT=5GB, PIPELINE_THREADS=2.)
      RUNNER_RAM_MB: 16384      # RAM envelope to enforce (peak RSS < this - headroom)
      RAM_HEADROOM_MB: 4096     # OS + runner agent + Python/DuckDB overhead + page cache
      DISK_HEADROOM_GB: 2       # fail if free disk on the work volume ever drops below this
      MIN_START_DISK_GB: 40     # fail fast if the work volume can't hold the dataset peak
      MAX_RUNTIME_MIN: 300      # soft wall-clock ceiling (hard cap is timeout-minutes, < GitHub's 360)
      # DuckDB budget for the 16 GB box. This is the DuckDB allocation, NOT the box:
      # the OS, runner agent, Python overhead and page cache also live in 16 GB.
      # 12 GB peaked ~12.5 GB and starved the runner ("lost communication"); 10 GB
      # keeps peak ~10.7 GB with ~5 GB headroom.
      PIPELINE_MEMORY_LIMIT: "10GB"
      PIPELINE_THREADS: "4"
      # The pipeline (main.py) reads the thresholds above. On CI we let it
      # MEASURE/report only and leave enforcement to the steps below (they use the
      # authoritative /usr/bin/time peak and preserve the artifact on a soft breach).
      # Locally the Python guardrails enforce by default so you can validate the fit.
      PIPELINE_GUARDRAILS: "off"
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          # Default root-reserve-mb is 1024, which leaves only ~1 GB free on the
          # root filesystem -- apt index writes and pip then fail with "No space
          # left on device" (root and the build volume are SEPARATE filesystems;
          # apt/pip/tmp live on root). Reserve 10 GB for root; the build volume is
          # still ~85-90 GB, far above the 40 GB the pipeline needs.
          root-reserve-mb: '10240'
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System and Python Dependencies
        run: |
          # Show root vs work-volume space up front: apt/pip write to ROOT, the
          # pipeline writes to the work volume. If root is tight here, raise
          # root-reserve-mb in the Maximize Build Space step.
          echo "Filesystem space at dependency install:"; df -h / "$PWD"
          # curl/tar/zstd are already on ubuntu-latest; the only thing we actually
          # need from apt is GNU `time` (/usr/bin/time -v, for peak RSS). Install
          # just that, and don't let a transient apt index hiccup fail the build:
          # if `time` is somehow already present, we skip apt entirely.
          if [ ! -x /usr/bin/time ]; then
            sudo apt-get update -o Acquire::Languages=none || true
            sudo apt-get install -y --no-install-recommends time
          fi
          /usr/bin/time --version || { echo "::error::/usr/bin/time missing"; exit 1; }
          # Pin DuckDB so a future breaking release can't silently change behaviour.
          # psutil powers the in-process guardrail measurements in guardrails.py.
          pip install "duckdb>=1.0,<2.0" psutil

      - name: Probe runner resources
        run: |
          set -uo pipefail
          ACTUAL_RAM_MB=$(awk '/MemTotal/{printf "%d", $2/1024}' /proc/meminfo)
          NPROC=$(nproc)
          # Work volume = the filesystem holding the checkout (the maximized build volume).
          read -r DISK_TOTAL_KB DISK_AVAIL_KB < <(df -Pk . | tail -1 | awk '{print $2, $4}')
          DISK_AVAIL_GB=$(awk "BEGIN{printf \"%.1f\", $DISK_AVAIL_KB/1048576}")
          DISK_TOTAL_GB=$(awk "BEGIN{printf \"%.1f\", $DISK_TOTAL_KB/1048576}")

          # Effective RAM ceiling = stricter of (target envelope, actual machine) - headroom.
          EFFECTIVE_RAM_MB=$RUNNER_RAM_MB
          if [ "$ACTUAL_RAM_MB" -lt "$EFFECTIVE_RAM_MB" ]; then EFFECTIVE_RAM_MB=$ACTUAL_RAM_MB; fi
          MAX_RSS_MB=$(( EFFECTIVE_RAM_MB - RAM_HEADROOM_MB ))

          # Publish for later steps.
          {
            echo "ACTUAL_RAM_MB=$ACTUAL_RAM_MB"
            echo "NPROC=$NPROC"
            echo "MAX_RSS_MB=$MAX_RSS_MB"
            echo "DISK_TOTAL_GB=$DISK_TOTAL_GB"
            echo "DISK_AVAIL_GB_START=$DISK_AVAIL_GB"
          } >> "$GITHUB_ENV"

          {
            echo "## Runner resources (detected)"
            echo ""
            echo "| Resource | Detected | Enforced ceiling |"
            echo "|---|---|---|"
            echo "| RAM | ${ACTUAL_RAM_MB} MB | peak RSS < ${MAX_RSS_MB} MB |"
            echo "| vCPU | ${NPROC} | - |"
            echo "| Work volume total | ${DISK_TOTAL_GB} GB | - |"
            echo "| Work volume free (start) | ${DISK_AVAIL_GB} GB | stay > ${DISK_HEADROOM_GB} GB |"
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          # Fail fast: not enough disk to hold the dataset peak (~30-40 GB with the
          # on-disk intermediates). Usually means Maximize Build Space under-delivered.
          if awk "BEGIN{exit !($DISK_AVAIL_KB/1048576 < $MIN_START_DISK_GB)}"; then
            echo "::error::Only ${DISK_AVAIL_GB} GB free on the work volume; need >= ${MIN_START_DISK_GB} GB. Check the Maximize Build Space step."
            exit 1
          fi

      - name: Generate Runtime Timestamp
        id: timestamp
        run: echo "RUN_TS=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build and compress (measured)
        run: |
          set +e
          set -o pipefail

          DISK_LOG="$(mktemp)"
          TIME_REPORT="$(mktemp)"
          ARTIFACT="metadata-${{ steps.timestamp.outputs.RUN_TS }}.db.zst"

          # --- background disk high-water sampler (every 10s) ---
          # Per sample: available bytes on the work volume + bytes used by the
          # working tree (spill buffer, engine file, db, vacuum copy, .zst).
          # CRITICAL: redirect the sampler's stdout off this step's pipe, or the
          # runner waits for that pipe to close and the step hangs after the real
          # work is done. Kill it hard (loop + any in-flight du/sleep child).
          sample_disk() {
            while true; do
              avail=$(df -B1 --output=avail . 2>/dev/null | tail -1 | tr -d ' ')
              used=$(du -sb . 2>/dev/null | cut -f1)
              echo "${avail:-0} ${used:-0}" >> "$DISK_LOG"
              sleep 10
            done
          }
          sample_disk >/dev/null 2>&1 &
          SAMPLER_PID=$!
          trap 'kill -9 "$SAMPLER_PID" 2>/dev/null; pkill -9 -P "$SAMPLER_PID" 2>/dev/null; true' EXIT

          # --- pipeline under GNU /usr/bin/time -v (peak RSS) ---
          # /usr/bin/time writes its report to -o; the pipeline's own per-phase
          # logs still stream to the console.
          PIPE_START=$(date +%s)
          /usr/bin/time -v -o "$TIME_REPORT" python scripts/main.py --prod
          PY_EXIT=$?
          PIPE_END=$(date +%s)
          PIPE_SECS=$(( PIPE_END - PIPE_START ))

          # --- zstd calibration: measure REAL throughput on THIS runner ----------
          # Compress a slice of the actual DB at candidate levels, time one pass
          # each, and project the full-DB time. This replaces generic benchmarks
          # with what this specific 2-core runner actually does, so the level/timeout
          # choice is grounded in measurement. Set ZSTD_CALIBRATE=0 to skip.
          if [ "$PY_EXIT" -eq 0 ] && [ "${ZSTD_CALIBRATE:-1}" != "0" ] && [ -f metadata.db ]; then
            CAL_SAMPLE="zstd_calib_sample.bin"
            CAL_TARGET=268435456                       # aim for a 256 MB slice
            DB_BYTES=$(stat -c%s metadata.db)
            head -c "$CAL_TARGET" metadata.db > "$CAL_SAMPLE" 2>/dev/null
            SB=$(stat -c%s "$CAL_SAMPLE" 2>/dev/null); SB=${SB:-0}
            {
              echo "## zstd calibration (measured on this runner)"
              echo ""
              echo "Sample: $(( SB / 1048576 )) MB of metadata.db; full DB: $(( DB_BYTES / 1048576 )) MB"
              echo ""
              echo "| Level | Measured speed | Projected full-DB compression |"
              echo "|---|---|---|"
              if [ "$SB" -gt 0 ]; then
                for L in 10 12 15 19; do
                  CS=$(date +%s%N)
                  zstd -q -$L -c "$CAL_SAMPLE" > /dev/null 2>&1
                  CE=$(date +%s%N)
                  MS=$(( (CE - CS) / 1000000 )); [ "$MS" -lt 1 ] && MS=1
                  MBPS=$(awk "BEGIN{printf \"%.1f\", ($SB/1048576)/($MS/1000.0)}")
                  FULL_MIN=$(awk "BEGIN{printf \"%.1f\", ($DB_BYTES*($MS/1000.0))/$SB/60}")
                  echo "| -$L | ${MBPS} MB/s | ${FULL_MIN} min |"
                done
              else
                echo "| - | sample unavailable | - |"
              fi
            } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stdout}"
            rm -f "$CAL_SAMPLE"
          fi

          # --- size-breakdown diagnostic: where do the gigabytes live? -----------
          # Per-object byte counts (dbstat) show exactly how much is tables vs the
          # covering indexes, and the MBID estimate quantifies the BLOB-16 lever
          # before committing to a both-ends schema change. Set SIZE_DIAG=0 to skip.
          # Note: dbstat does a full pass over the DB file (~1-3 min on this DB).
          if [ "$PY_EXIT" -eq 0 ] && [ "${SIZE_DIAG:-1}" != "0" ] && [ -f metadata.db ]; then
            python - metadata.db <<'PYDIAG' | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stdout}"
          import sqlite3, sys, os
          db = sys.argv[1]
          total = os.path.getsize(db)
          con = sqlite3.connect(f"file:{db}?mode=ro", uri=True)
          cur = con.cursor()

          print("## Size breakdown diagnostic")
          print()
          print(f"On-disk DB: {total/1e9:.2f} GB")
          print()

          # Per-object bytes via dbstat (tables + indexes).
          rows, have_dbstat = [], True
          try:
              rows = cur.execute(
                  "SELECT name, SUM(pgsize) FROM dbstat GROUP BY name ORDER BY 2 DESC"
              ).fetchall()
          except Exception as e:
              have_dbstat = False
              print(f"_dbstat unavailable in this SQLite build ({e}); per-object sizes skipped._")
              print()

          kind_cache = {}
          def kind(name):
              if name not in kind_cache:
                  r = cur.execute("SELECT type FROM sqlite_master WHERE name=?", (name,)).fetchone()
                  kind_cache[name] = r[0] if r else "?"
              return kind_cache[name]

          if have_dbstat:
              print("### Bytes per object (uncompressed)")
              print()
              print("| Object | Type | Size | % of DB |")
              print("|---|---|---|---|")
              tbl_tot = idx_tot = 0
              for name, b in rows:
                  if not b:
                      continue
                  k = kind(name)
                  if k == "index":
                      idx_tot += b
                  elif k == "table":
                      tbl_tot += b
                  print(f"| {name} | {k} | {b/1e9:.2f} GB | {100*b/total:.1f}% |")
              print()
              print(f"**Tables total:** {tbl_tot/1e9:.2f} GB  |  "
                    f"**Indexes total:** {idx_tot/1e9:.2f} GB "
                    f"({100*idx_tot/total:.0f}% of the DB is index)")
              print()

          # Row counts + MBID storage cost (TEXT(36) vs BLOB(16)) per table.
          print("### Row counts and the MBID (BLOB-16) lever")
          print()
          print("| Table | Rows | MBID cols | as TEXT | as BLOB | saving |")
          print("|---|---|---|---|---|---|")
          tables = [r[0] for r in cur.execute(
              "SELECT name FROM sqlite_master WHERE type='table' "
              "AND name NOT LIKE 'sqlite_%' ORDER BY name").fetchall()]
          tot_text = tot_blob = 0
          for t in tables:
              try:
                  n = cur.execute(f'SELECT COUNT(*) FROM "{t}"').fetchone()[0]
              except Exception:
                  continue
              cols = [c[1] for c in cur.execute(f'PRAGMA table_info("{t}")').fetchall()]
              mb = sum(1 for c in cols if c.lower().endswith("_mbid"))
              if not mb:
                  continue
              # SQLite per-value: ~1B serial-type header + 36B text vs 16B blob.
              text_b = n * mb * 37
              blob_b = n * mb * 17
              tot_text += text_b
              tot_blob += blob_b
              print(f"| {t} | {n:,} | {mb} | {text_b/1e9:.2f} GB | "
                    f"{blob_b/1e9:.2f} GB | {(text_b-blob_b)/1e9:.2f} GB |")
          print()
          print(f"**MBID columns in tables alone:** ~{tot_text/1e9:.2f} GB as TEXT vs "
                f"~{tot_blob/1e9:.2f} GB as BLOB -> **~{(tot_text-tot_blob)/1e9:.2f} GB** "
                f"uncompressed saving. Indexes that lead with / include an MBID save "
                f"more on top (see the index rows above).")
          print()
          con.close()
          PYDIAG
          fi

          # --- compression -------------------------------------------------------
          # Free-tier-MAX compression. The data is near-incompressible (random UUID
          # hex in tables + covering indexes), so level is a weak lever: -12 gave
          # 46% (9.4 GB); -19 gets ~38-42% (~8 GB). -19 is the ceiling that fits the
          # 6h job cap (~3.5-4h per calibration); --ultra -22 would be ~7.5h -> crash.
          # --long=27 dedups repeated names/titles across text_lookup; 27 is the
          # largest window that STILL decompresses with a plain `zstd -d` (128 MB),
          # so the 4 GB-laptop downstream needs no flag and little memory.
          # To go meaningfully below ~8 GB requires DATA reduction (BLOB-16 MBIDs),
          # not compression.
          ZSTD_EXIT=0
          ZSTD_SECS=0
          if [ "$PY_EXIT" -eq 0 ]; then
            Z_START=$(date +%s)
            timeout 300m zstd -19 --long=27 -v metadata.db -o "$ARTIFACT"
            ZSTD_EXIT=$?
            ZSTD_SECS=$(( $(date +%s) - Z_START ))
          fi

          # --- stop sampler (hard; reap any in-flight du/sleep child too) ---
          kill -9 "$SAMPLER_PID" 2>/dev/null
          pkill -9 -P "$SAMPLER_PID" 2>/dev/null
          wait "$SAMPLER_PID" 2>/dev/null || true

          # --- parse measurements ---
          PEAK_RSS_KB=$(grep -i "Maximum resident set size" "$TIME_REPORT" | grep -oE '[0-9]+' | tail -1)
          PEAK_RSS_KB=${PEAK_RSS_KB:-0}
          RSS_MB=$(( PEAK_RSS_KB / 1024 ))

          SAMPLES=$(wc -l < "$DISK_LOG" 2>/dev/null | tr -d ' '); SAMPLES=${SAMPLES:-0}
          MIN_AVAIL=$(awk 'NR==1{m=$1} $1<m{m=$1} END{print (NR? m : 0)+0}' "$DISK_LOG" 2>/dev/null)
          MAX_USED=$(awk 'BEGIN{m=0} $2>m{m=$2} END{print m+0}' "$DISK_LOG" 2>/dev/null)
          MIN_AVAIL=${MIN_AVAIL:-0}; MAX_USED=${MAX_USED:-0}
          AVAIL_GB=$(awk "BEGIN{printf \"%.2f\", $MIN_AVAIL/1073741824}")
          USED_GB=$(awk "BEGIN{printf \"%.2f\", $MAX_USED/1073741824}")

          TOTAL_SECS=$(( PIPE_SECS + ZSTD_SECS ))
          PIPE_MIN=$(awk "BEGIN{printf \"%.1f\", $PIPE_SECS/60}")
          ZSTD_MIN=$(awk "BEGIN{printf \"%.1f\", $ZSTD_SECS/60}")
          TOTAL_MIN=$(awk "BEGIN{printf \"%.1f\", $TOTAL_SECS/60}")

          DB_MB=0;  [ -f metadata.db ] && DB_MB=$(( $(stat -c%s metadata.db) / 1048576 ))
          ART_MB=0; [ -f "$ARTIFACT" ] && ART_MB=$(( $(stat -c%s "$ARTIFACT") / 1048576 ))

          DISK_FLOOR_BYTES=$(( DISK_HEADROOM_GB * 1073741824 ))

          # --- human-readable report -> job summary + log ---
          {
            echo "## Pipeline guardrail report"
            echo ""
            echo "| Metric | Value | Limit |"
            echo "|---|---|---|"
            echo "| Peak RSS | ${RSS_MB} MB | ${MAX_RSS_MB} MB |"
            echo "| Min free disk | ${AVAIL_GB} GB | ${DISK_HEADROOM_GB} GB |"
            echo "| Peak working-set disk | ${USED_GB} GB | - |"
            echo "| Pipeline time | ${PIPE_MIN} min | - |"
            echo "| Compression time | ${ZSTD_MIN} min | - |"
            echo "| Total time | ${TOTAL_MIN} min | ${MAX_RUNTIME_MIN} min |"
            echo "| Uncompressed DB | ${DB_MB} MB | - |"
            echo "| Compressed artifact | ${ART_MB} MB | - |"
            echo "| Disk samples taken | ${SAMPLES} | - |"
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          # --- hand measurements to the enforcement step ---
          {
            echo "PY_EXIT=$PY_EXIT"
            echo "ZSTD_EXIT=$ZSTD_EXIT"
            echo "RSS_MB=$RSS_MB"
            echo "MAX_RSS_MB=$MAX_RSS_MB"
            echo "MIN_AVAIL=$MIN_AVAIL"
            echo "DISK_FLOOR_BYTES=$DISK_FLOOR_BYTES"
            echo "SAMPLES=$SAMPLES"
            echo "TOTAL_SECS=$TOTAL_SECS"
            echo "TOTAL_MIN=$TOTAL_MIN"
            echo "AVAIL_GB=$AVAIL_GB"
            echo "MAX_RUNTIME_MIN=$MAX_RUNTIME_MIN"
          } > guardrail_metrics.env

          # Fail this step immediately only on a hard process error (no artifact to
          # keep). Resource-limit breaches are enforced after upload so the artifact
          # is still preserved for inspection.
          if [ "$PY_EXIT" -ne 0 ]; then echo "::error::Pipeline process exited with code $PY_EXIT"; exit "$PY_EXIT"; fi
          if [ "$ZSTD_EXIT" -ne 0 ]; then echo "::error::Compression exited with code $ZSTD_EXIT"; exit "$ZSTD_EXIT"; fi

      - name: Upload Finished Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ steps.timestamp.outputs.RUN_TS }}
          path: metadata-${{ steps.timestamp.outputs.RUN_TS }}.db.zst
          retention-days: 14
          if-no-files-found: ignore

      - name: Enforce guardrails
        if: always()
        run: |
          set +e
          if [ ! -f guardrail_metrics.env ]; then
            echo "No guardrail metrics found (build step failed before producing them)."
            exit 0
          fi
          set -a; . ./guardrail_metrics.env; set +a

          FAIL=0
          # RAM ceiling (peak RSS vs min(target, actual) - headroom)
          if [ "${RSS_MB:-0}" -gt "${MAX_RSS_MB:-0}" ]; then
            echo "::error::Peak RSS ${RSS_MB}MB exceeded RAM ceiling ${MAX_RSS_MB}MB (free-tier envelope)"; FAIL=1
          fi
          # Storage floor (free disk never below headroom)
          if [ "${SAMPLES:-0}" -gt 0 ] && awk "BEGIN{exit !(${MIN_AVAIL:-0} < ${DISK_FLOOR_BYTES:-0})}"; then
            echo "::error::Free disk fell to ${AVAIL_GB}GB, below the ${DISK_HEADROOM_GB}GB floor"; FAIL=1
          fi
          # Runtime ceiling (soft, below the 6h hard cap)
          if [ "${TOTAL_SECS:-0}" -gt $(( ${MAX_RUNTIME_MIN:-300} * 60 )) ]; then
            echo "::error::Total runtime ${TOTAL_MIN}min exceeded ${MAX_RUNTIME_MIN}min"; FAIL=1
          fi

          if [ "$FAIL" -eq 0 ]; then echo "All guardrails within the free-tier runner envelope."; fi
          exit "$FAIL"
